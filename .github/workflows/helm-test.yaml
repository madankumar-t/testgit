name: Deploy Helm Chart

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    env:
      AWS_REGION: ap-south-1
      EKS_CLUSTER_NAME: my-eks-cluster
      HELM_RELEASE_NAME: my-app
      HELM_CHART_PATH: ./helm/my-app
      ENVIRONMENT: ${{ github.event.inputs.environment }}
      NAMESPACE: my-app-${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Helm
        uses: Azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Helm lint
        run: |
          helm lint $HELM_CHART_PATH

      - name: Render Helm templates
        run: |
          helm template $HELM_RELEASE_NAME $HELM_CHART_PATH \
            --namespace $NAMESPACE \
            --values $HELM_CHART_PATH/values-$ENVIRONMENT.yaml

      - name: Helm deploy
        run: |
          helm upgrade --install $HELM_RELEASE_NAME $HELM_CHART_PATH \
            --namespace $NAMESPACE \
            --create-namespace \
            --values $HELM_CHART_PATH/values-$ENVIRONMENT.yaml \
            --atomic \
            --wait \
            --timeout 10m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/my-app -n $NAMESPACE --timeout=300s
          helm status $HELM_RELEASE_NAME -n $NAMESPACE
